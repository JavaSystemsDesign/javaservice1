server:
  port: 8080

spring:
  application:
    name: javaservice1

logging:
  level:
    root: INFO
    com.example.javaservice1: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
